<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotiPanda - Marketplace Venezuela</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #0c0c0c 0%, #1a0033 50%, #0f0f23 100%);
            color: #fff; min-height: 100vh; overflow-x: hidden;
        }
        .header { 
            text-align: center; padding: 2rem; background: linear-gradient(45deg, #00d4ff, #7b00ff, #00ff88);
            background-size: 300% 300%; animation: gradientShift 3s ease infinite;
        }
        @keyframes gradientShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
        .logo { font-size: 3.5rem; font-weight: bold; text-shadow: 0 0 20px #00d4ff; margin-bottom: 1rem; }
        .filters { 
            display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; padding: 2rem; background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px); max-width: 1200px; margin: 0 auto;
        }
        .filter-group { display: flex; flex-direction: column; gap: 0.5rem; }
        select, input { 
            padding: 0.8rem 1.2rem; border: none; border-radius: 25px; background: rgba(255,255,255,0.1);
            color: #fff; font-size: 1rem; backdrop-filter: blur(10px); border: 2px solid transparent;
            transition: all 0.3s ease; width: 200px;
        }
        select:focus, input:focus { outline: none; border-color: #00d4ff; box-shadow: 0 0 15px #00d4ff; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 2rem; }
        .card { 
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(0,0,0,0.5)); 
            border-radius: 20px; padding: 2rem; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.4s ease; position: relative; overflow: hidden;
        }
        .card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 20px 40px rgba(0,212,255,0.4); }
        .card::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; 
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: left 0.5s; }
        .card:hover::before { left: 100%; }
        .service-title { font-size: 1.8rem; color: #00ff88; margin-bottom: 1rem; font-weight: bold; }
        .price { font-size: 2rem; color: #ffd700; font-weight: bold; margin: 1rem 0; text-shadow: 0 0 10px #ffd700; }
        .location { color: #00d4ff; font-size: 1.1rem; margin-bottom: 1rem; }
        .whatsapp-btn { 
            width: 100%; padding: 1rem; background: linear-gradient(45deg, #25d366, #00d4ff); 
            color: white; border: none; border-radius: 50px; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; transition: all 0.3s; box-shadow: 0 5px 15px rgba(37,211,102,0.4);
        }
        .whatsapp-btn:hover { transform: scale(1.05); box-shadow: 0 10px 25px rgba(37,211,102,0.6); }
        .contact-section { 
            text-align: center; padding: 4rem 2rem; background: linear-gradient(45deg, #7b00ff, #00ff88);
            margin-top: 4rem; border-radius: 30px; max-width: 800px; margin-left: auto; margin-right: auto;
        }
        .contact-title { font-size: 2.5rem; margin-bottom: 1rem; }
        .contact-info { font-size: 1.3rem; margin-bottom: 2rem; }
        .admin-whatsapp { 
            display: inline-block; padding: 1.2rem 2.5rem; background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            color: white; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 1.2rem;
            box-shadow: 0 10px 30px rgba(255,107,107,0.5); transition: all 0.3s;
        }
        .admin-whatsapp:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(255,107,107,0.7); }
        @media (max-width: 768px) { .filters { flex-direction: column; align-items: center; } .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">🐼 NotiPanda</div>
        <p>El marketplace más rápido de Venezuela</p>
    </header>

    <div class="filters">
        <div class="filter-group">
            <label>Categoría</label>
            <select id="categoriaFilter">
                <option value="">Todas</option>
                <option value="comida">🍔 Comida</option>
                <option value="internet">🌐 Internet</option>
                <option value="educacion">📚 Educación</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Nombre</label>
            <input type="text" id="nombreFilter" placeholder="Buscar por nombre...">
        </div>
        <div class="filter-group">
            <label>Ubicación</label>
            <input type="text" id="ubicacionFilter" placeholder="Los Guayos, Maiquetía...">
        </div>
        <div class="filter-group">
            <label>Precio</label>
            <select id="precioFilter">
                <option value="">Todos</option>
                <option value="bajo">Menor a $10</option>
                <option value="medio">$10 - $20</option>
                <option value="alto">Mayor a $20</option>
            </select>
        </div>
        <button onclick="limpiarFiltros()" style="padding: 0.8rem 2rem; background: #ff6b6b; border: none; border-radius: 25px; color: white; cursor: pointer;">🔄 Limpiar</button>
    </div>

    <div class="container">
        <div id="anunciosGrid" class="grid"></div>
    </div>

    <section class="contact-section">
        <h2 class="contact-title">¿Quieres agregar tu negocio a NotiPanda?</h2>
        <p class="contact-info">Comunícate conmigo para publicar tus servicios GRATIS</p>
        <a href="https://wa.me/584244525765?text=Hola%20Jhon!%20Quiero%20publicar%20mi%20negocio%20en%20NotiPanda%20🐼" 
           class="admin-whatsapp" target="_blank">📲 Contactar Administrador</a>
    </section>

    <script>
        const anuncios = [
            {
                id: 1,
                nombre: "Novillito Exprés",
                servicio: "Carne de hamburguesa (pack 6 unidades)",
                precio: 2,
                ubicacion: "Los Guayos, Félix Ríos",
                whatsapp: "584244569867",
                categoria: "comida",
                color: "#ff6b6b"
            },
            {
                id: 2,
                nombre: "Yogurt Jonas",
                servicio: "Venta de Yogurt",
                precio: 5,
                ubicacion: "Los Guayos, Félix Ríos",
                whatsapp: "584244100777",
                categoria: "comida",
                color: "#4ecdc4"
            },
            {
                id: 3,
                nombre: "Toldo Azul",
                servicio: "Venta Combos Hamburguesas y Perros",
                precio: 5,
                ubicacion: "Los Guayos, Las Americas",
                whatsapp: "584120370662",
                categoria: "comida",
                color: "#4ecdc4"
            },
            {
                id: 4,
                nombre: "Servicios JL",
                servicio: "Venta de internet",
                precio: 18,
                ubicacion: "Los Guayos, Félix Ríos",
                whatsapp: "584244525765",
                categoria: "internet",
                color: "#4ecdc4"
            },
            {
                id: 5,
                nombre: "Nexus.net",
                servicio: "Tareas dirigidas (todos los niveles)",
                precio: 5,
                ubicacion: "Los Guayos, Félix Ríos",
                whatsapp: "584244525765",
                categoria: "educacion",
                color: "#45b7d1"
            }
        ];

        function renderAnuncios(anunciosFiltrados) {
            const grid = document.getElementById('anunciosGrid');
            grid.innerHTML = anunciosFiltrados.map(ann => `
                <div class="card" data-categoria="${ann.categoria}" data-precio="${ann.precio}" data-ubicacion="${ann.ubicacion}" data-nombre="${ann.nombre}">
                    <div class="service-title" style="color: ${ann.color}">${ann.nombre}</div>
                    <div class="service-desc">${ann.servicio}</div>
                    <div class="price">$${ann.precio}</div>
                    <div class="location">📍 ${ann.ubicacion}</div>
                    <button class="whatsapp-btn" onclick="abrirWhatsapp('${ann.whatsapp}', '${ann.servicio} - $${ann.precio}')">
                        💬 Contactar Vendedor
                    </button>
                </div>
            `).join('');
        }

        function filtrarAnuncios() {
            const categoria = document.getElementById('categoriaFilter').value;
            const nombre = document.getElementById('nombreFilter').value.toLowerCase();
            const ubicacion = document.getElementById('ubicacionFilter').value.toLowerCase();
            const precio = document.getElementById('precioFilter').value;

            let filtrados = anuncios.filter(ann => {
                return (!categoria || ann.categoria === categoria) &&
                       (!nombre || ann.nombre.toLowerCase().includes(nombre) || ann.servicio.toLowerCase().includes(nombre)) &&
                       (!ubicacion || ann.ubicacion.toLowerCase().includes(ubicacion)) &&
                       (!precio || 
                           (precio === 'bajo' && ann.precio < 10) ||
                           (precio === 'medio' && ann.precio >= 10 && ann.precio <= 20) ||
                           (precio === 'alto' && ann.precio > 20)
                       );
            });

            renderAnuncios(filtrados);
        }

        function abrirWhatsapp(telefono, mensaje) {
            const url = `https://wa.me/${telefono}?text=Hola!%20Estoy%20interesado%20en:%20${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
        }

        function limpiarFiltros() {
            document.getElementById('categoriaFilter').value = '';
            document.getElementById('nombreFilter').value = '';
            document.getElementById('ubicacionFilter').value = '';
            document.getElementById('precioFilter').value = '';
            renderAnuncios(anuncios);
        }

        // Event listeners para filtros en tiempo real
        document.getElementById('categoriaFilter').addEventListener('change', filtrarAnuncios);
        document.getElementById('nombreFilter').addEventListener('input', filtrarAnuncios);
        document.getElementById('ubicacionFilter').addEventListener('input', filtrarAnuncios);
        document.getElementById('precioFilter').addEventListener('change', filtrarAnuncios);

        // Render inicial
        renderAnuncios(anuncios);
    </script>
</body>
</html>
